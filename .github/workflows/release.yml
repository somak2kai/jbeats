name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build release native images (all platforms) ───────────────────────
  native:
    name: Native image (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # linux/amd64
          - os: ubuntu-24.04-arm
          - os: macos-latest        # darwin/arm64 (Apple Silicon)
          # - os: macos-13          # TODO: darwin/amd64 (Intel) — runner queue too slow, enable later
          - os: windows-latest      # windows/amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.3
        with:
          java-version: "21"
          distribution: "graalvm"
          native-image-job-reports: "true"

      - name: Cache Maven packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build native image
        run: mvn -Pnative package -DskipTests

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          echo 'public class Smoke { public void hello() {} }' > /tmp/Smoke.java
          ./target/jbeats --inp=/tmp/Smoke.java

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Content -Path "$env:TEMP\Smoke.java" -Value 'public class Smoke { public void hello() {} }'
          .\target\jbeats.exe --inp="$env:TEMP\Smoke.java"

      - name: Upload release binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jbeats-${{ runner.os }}-${{ runner.arch }}
          path: target/jbeats
          if-no-files-found: error

      - name: Upload release binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jbeats-${{ runner.os }}-${{ runner.arch }}
          path: target/jbeats.exe
          if-no-files-found: error

  # ── Publish GitHub Release ────────────────────────────────────────────
  release:
    name: Publish release
    needs: native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Download all release artifacts
        uses: actions/download-artifact@v4 # pin SHA: git ls-remote https://github.com/actions/download-artifact refs/tags/v4
        with:
          pattern: jbeats-*
          path: artifacts/

      - name: Rename to canonical asset names
        run: |
          mv artifacts/jbeats-Linux-X64/jbeats       jbeats-linux-amd64
          mv artifacts/jbeats-Linux-ARM64/jbeats      jbeats-linux-arm64
          mv artifacts/jbeats-macOS-ARM64/jbeats      jbeats-darwin-arm64
          mv artifacts/jbeats-macOS-X64/jbeats        jbeats-darwin-amd64
          mv artifacts/jbeats-Windows-X64/jbeats.exe  jbeats-windows-amd64.exe
          chmod +x jbeats-linux-* jbeats-darwin-*

      - name: Compute sha256 checksums
        run: |
          sha256sum jbeats-linux-amd64 jbeats-linux-arm64 \
                    jbeats-darwin-arm64 jbeats-darwin-amd64 \
                    jbeats-windows-amd64.exe > checksums.txt

      - name: Create versioned GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "jbeats ${{ github.ref_name }}" \
            --generate-notes \
            jbeats-linux-amd64 \
            jbeats-linux-arm64 \
            jbeats-darwin-arm64 \
            jbeats-darwin-amd64 \
            jbeats-windows-amd64.exe \
            checksums.txt

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}

          SHA_DARWIN_ARM64=$(grep "jbeats-darwin-arm64" checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep "jbeats-darwin-amd64" checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep  "jbeats-linux-arm64"  checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep  "jbeats-linux-amd64"  checksums.txt | awk '{print $1}')

          git clone https://x-access-token:${GH_TOKEN}@github.com/somak2kai/homebrew-tap.git tap
          cd tap

          sed -i "s|version \".*\"|version \"${VERSION_NUM}\"|" jbeats.rb
          sed -i "s|JBEATS_SHA256_DARWIN_ARM64 = \".*\"|JBEATS_SHA256_DARWIN_ARM64 = \"${SHA_DARWIN_ARM64}\"|" jbeats.rb
          sed -i "s|JBEATS_SHA256_DARWIN_AMD64 = \".*\"|JBEATS_SHA256_DARWIN_AMD64 = \"${SHA_DARWIN_AMD64}\"|" jbeats.rb
          sed -i "s|JBEATS_SHA256_LINUX_ARM64  = \".*\"|JBEATS_SHA256_LINUX_ARM64  = \"${SHA_LINUX_ARM64}\"|"  jbeats.rb
          sed -i "s|JBEATS_SHA256_LINUX_AMD64  = \".*\"|JBEATS_SHA256_LINUX_AMD64  = \"${SHA_LINUX_AMD64}\"|"  jbeats.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add jbeats.rb
          git commit -m "chore: bump jbeats to ${VERSION}"
          git push

      - name: Update rolling release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Force-move the 'latest' git tag to this commit
          git tag -f latest
          git push origin -f latest

          # Delete existing latest release if present, then recreate
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "jbeats latest (${{ github.ref_name }})" \
            --notes "Always points to the latest release. Currently: ${{ github.ref_name }}" \
            jbeats-linux-amd64 \
            jbeats-linux-arm64 \
            jbeats-darwin-arm64 \
            jbeats-darwin-amd64 \
            jbeats-windows-amd64.exe \
            checksums.txt
