name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # ── Run tests on the JVM first ───────────────────────────────────────
  test:
    name: Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.6
        with:
          java-version: "21"
          distribution: "graalvm"

      - name: Cache Maven packages
        uses: actions/cache@d4323d4df104b026c6a166049fb557cb5d0bedfc # v4.2.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn test

  # ── Build native images (Linux + macOS) ──────────────────────────────
  native:
    name: Native image (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.3
        with:
          java-version: "21"
          distribution: "graalvm"
          native-image-job-reports: "true"

      - name: Cache Maven packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build native image
        run: mvn -Pnative package -DskipTests

      - name: Smoke test
        run: |
          echo 'public class Smoke { public void hello() {} }' > /tmp/Smoke.java
          ./target/jbeats --inp=/tmp/Smoke.java
          echo "Exit code: $?"

      - name: Upload native binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jbeats-${{ runner.os }}-${{ runner.arch }}
          path: target/jbeats
          if-no-files-found: error
